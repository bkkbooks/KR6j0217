body:
  text: 西天北印度烏填曩國帝釋宮寺三藏傳法大師賜紫沙門臣施護奉詔譯如是我聞一時佛在摩誐陀國無垢園中寶光明池側與大菩薩及諸聲聞天龍夜叉犍闥婆阿蘇囉𦾨嚕茶緊那羅麼護囉誐人非人等并諸王衆長者居士百千圍繞恭敬聽法爾時衆中有大富婆羅門名無垢妙光即於會中能解微妙曉達師法聰明辨才愛樂多聞修崇十善信重三寶歡喜踊躍而作是念一切有情修善為因財富無量資具衆多我當修習爾時大婆羅門無垢妙光起立合掌繞佛七匝以種種花塗香粖香等供養世尊及諸衣服真珠瓔珞價直百千持以施佛頭面禮足而白佛言世尊願起大悲願受我食如是三請爾時世尊默然受請於是無垢妙光大婆羅門見其世尊默然受請而速歸還經於一宿備辦種種衆多美膳六味具足飲食辦已嚴飾舍宅樓閣浴池繒綵甚衆花香粖香種種諸香及塗身香等諸供養具無不周備即時婆羅門等執持花幡奏諸妓樂與其眷屬往詣無垢園中寶光明池側迎請世尊到已白佛言世尊食時已至飯食悉辦唯願世尊與諸大衆往至我舍受我供養爾時世尊觀察衆會安慰無垢妙光大婆羅門曰善哉善哉如汝所願又告諸衆并餘天等悉皆往彼於是世尊從座而起與諸大衆菩薩聲聞天龍八部人非人等及諸王衆臣民眷屬無量百千恭敬圍繞皆來集會當行往彼無垢妙光大婆羅門家爾時世尊身縱金色放種種光無量諸相變作種種光明之網遍照十方一切佛剎又復照曜彼佛剎中諸佛如來道場衆會變作種種供養之具照曜彼已還復來入釋迦牟尼身毛孔中即時無垢妙光大婆羅門與其眷屬一心恭敬欲供養佛掃除道路嚴飾清淨爾時世尊與諸大衆天龍夜叉犍闥婆阿蘇洛𦾨嚕茶緊那羅麼護囉誐帝釋梵王護世四王麼醯首羅那羅延等百千之衆恭敬圍繞往詣於彼爾時世尊當路而行於前中路有一園苑名為安樂彼園苑內有大舊塔極甚損壞四邊荊棘草木叢林堅硬閉塞猶如丘埠爾時世尊將近彼塔丘埠四面周匝焰熾種種色相光明照曜於彼破塔遠近皆覩又於光中出妙音聲讚言善哉善哉釋迦牟尼佛清淨微妙瑞相無量不可稱量彼無垢妙光大婆羅門請於如來今現希奇難思大事爾時釋迦牟尼如來施繞破舊丘埠之塔欲伸供養復解自身衣服嚴具覆蓋於彼舊塔塠埠蓋覆已畢悲泣雨淚又復思念舍利出現及十方佛悉皆出現即時舍利從塔湧出皆在十方諸佛如來手掌中住爾時十方諸佛如來亦皆雨淚而彼諸佛身放光明照曜故塔作光明網內外瑩徹清淨無比然後光明及佛舍利還入塔中彼時衆會悉皆悲泣驚怪希奇歎未曾有爾時會中有大藥叉主名金剛手身光焰熾臂膊傭直柔軟光澤猶如象鼻輪金剛杵速疾往詣世尊之前頭面禮足而白佛言世尊云何現此希奇瑞相及十方佛悉皆雨淚光明照曜唯願如來為我演説決於衆疑爾時世尊告大藥叉主金剛手言此是一切如來全身舍利聚此塔中及一切如來百千俱胝胡麻形像正法心印陀羅尼亦在塔中應知金剛手此胡麻量諸佛形像正法心印陀羅尼止住塔中由此百千俱胝如來全身舍利亦住此中若此正法心印陀羅尼在此塔中彼八萬四千法門亦在此中及九十九百千俱胝如來頂髻受記亦在此中當知金剛手若一切如來舍利之塔及此正法心印陀羅尼所有功德無量無邊不可思議不可稱歎應知金剛手由此正法篋印心陀羅尼而能增長圓滿一切正法及諸功德爾時世尊説此法時彼諸大衆聞法歡喜滅除垢染得法眼淨其中有得預流一來不還阿羅漢果及緣覺乘其中有證初地二地乃至十地或於其中有得六波羅蜜悉皆圓滿或有得受菩提之記或有獲得阿鞞跋致時彼無垢妙光大婆羅門即於會中離諸煩惱滅除障染獲五神通爾時金剛手大藥叉主覩如是等希奇變現自在神通踊躍歡喜歎未曾有而白佛言世尊此正法印心陀羅尼有如是等廣大利益若諸有情書寫莊嚴受持讀誦尊重讚歎獲何果報願佛演説爾時世尊告大藥叉金剛手言諦聽諦聽吾為汝説若有苾芻苾芻尼塢波索迦塢波斯迦受持讀誦書寫尊重此正法印心陀羅尼獲得九十九百千俱胝胡麻量等形像如來福德之聚善根果報又得逢事彼諸如來受菩提記所以者何此正法印心陀羅尼是彼九十九百千俱胝那瑜多胡麻量等形像如來同共宣説若復有人受持讀誦此正法印心陀羅尼經即得值遇十方世界九十九百千俱胝那瑜多胡麻量等形像如來若有苾芻苾芻尼塢波索迦塢波斯迦族姓男族姓女於此正法印心陀羅尼經若能日日恭敬供養花香粖香花鬘塗香細妙衣服及莊嚴具等所獲功德如彼供養十方世界九十九百千俱胝胡麻等形像如來功德無異又得一一如來廣大莊嚴具等及獲無量七寶之聚如蘇彌盧爾時衆會天龍藥叉犍闥婆阿素囉𦾨嚕茶緊那羅摩護囉誐人非人等一切大衆悉皆驚疑歎未曾有如是朽爛破壞之塔常被荊棘閉塞草木叢林堅密充滿猶如丘埠今日如來起大慈悲自在神通現如是等希奇瑞相七寶妙塔不可思議時諸大衆稱歎無盡即時會中有金剛手大藥叉主而白佛言世尊云何破壞丘埠之塔變現如是衆妙莊嚴爾時佛告金剛手言離此彼壞丘埠之塔無別七寶衆妙之塔所以者何隨識變現或見荊棘丘埠之塔或見七寶衆妙莊嚴又諸佛所現十方如來全身舍利所藏之塔百珍七寶衆妙莊嚴衆生惡業乃見荊棘破壞之塔當知金剛手大藥叉主若於末世最後分時謂諸有情罪業深重不植善根廣作不善三惡道業以此因緣生無佛世亦常不聞諸佛名字及恆遠離僧法之名如是之事真實不虛所以諸佛及我雨淚悲歎復次金剛手若正法將滅安住此塔一切如來全身舍利亦乃藏於此塔之中謂以一切如來所説之法而加護之即時金剛手大藥叉主而白佛言世尊一切有情云何植善云何正法安置此塔爾時世尊告金剛手言若復有人信解受持讀誦書寫為人演説種種莊嚴安置塔中即是安置一切如來全身舍利藏此塔中復得一切如來總持祕密而加護之復得十方世界九十九胡麻量等形像諸佛之塔而加護之復得一切如來頂髻眼塔而加護之若復有人用於七寶如法加持雕作諸佛及菩薩像種種莊嚴安置塔中復用繖蓋相輪寶網鈴鐸衆妙嚴飾鐘磬鐃鈸及諸器物花香瓔珞衣服飲食諸供具等又以一切如來正法加持真實護淨精進恆時離於懈怠又復此塔時遷變壞重修嚴飾種種供養精心信敬不生疑謗彼當獲得無上菩提若復有人旋繞此塔一二匝等或一禮拜即得解脫無間之罪必當證得阿毗跋致乃至究竟佛果菩提若有此塔所住之處一切十方諸佛形像亦在此中復次若有此塔之處由彼一切如來加護力故彼地四方而無毒龍雷雹風雨非時損害及諸怖畏彼處復無諸毒蟲蟻所謂毒蛇狼鼠蝗蟲蝮蝎黃蜂黑蜂乃至蜈蚣百足悉皆遠離復次彼地而無暴惡虎狼師子飛禽走獸不能傷害又復彼地一切災難而無嬈亂又無夜叉羅剎部多吠多拏又毗舍遮顛狂鬼魅不能傷害又無瘧病瘡腫痑肒痔瘻白癩疥癬一切疾病不能侵害若復有人見此寶塔歡喜讚禮諸損壞等不能侵害又復彼地牛馬羊犬種種傍生及諸男女而無中夭及無刀兵器杖水火焚漂怖畏等事彼地亦無飢饉疾疫種種怖畏彼處常得四大天王圍繞擁護及二十八部大藥叉主密隱形儀恆來擁護及三十三天二十八宿羅睺諸星乃至日月晝夜順行若諸龍王恆常觀察應時降雨或有欲色乃至無色一切諸天於三際時來降此塔禮拜供養一切如來恭敬尊重憶念思惟若復有人恆常修嚴佛塔形像或用木石泥土彩畫金銀鍮石等及此正法印心陀羅尼經書寫莊嚴又以一切如來如法護持然後安置寶塔之中又此寶塔四邊階道悉皆嚴飾相輪幢幡周匝懸鈴七寶羅網高廣大小隨意自在種種莊嚴又以十方如來正法而加持之復作一切聖賢擁護之法而加護持然後種種廣陳香花飲食乃至瓔珞精虔供養如是乃獲無量功德即時會中有金剛手大藥叉主復白佛言世尊有何因緣此正法印心陀羅尼書寫受持供養恭敬獲如是等無量功德爾時世尊告金剛手言此是法界一切如來全身舍利祕密篋印心陀羅尼所以獲是無量功德時金剛手大藥叉主聞佛所説無量功德歡喜信受復白佛言世尊願佛慈悲演説此法我等樂聞爾時世尊告金剛手言汝等諦聽今為汝説此正法印心陀羅尼是過去未來現在諸佛同共宣説若有信受恭敬供養乃至證入聲聞緣覺及於十地法報化身所以名為全身正法祕密篋印爾時世尊即説呪曰曩莫悉底哩三合野一地尾二合迦去喃去引二薩嚩怛他去引𦾨跢上南三唵四部悉底哩三合步平嚩曩嚩㘑五嚩嚩㘑六祖魯祖魯七他囉他囉八薩嚩怛他去引𦾨跢上馱引上覩他哩九鉢納麼二合三去婆吠十惹野他哩捫上佐裔十一娑麼二合囉達轉舌麼作訖囉二合十二鉢囉二合襪無鉢反轉舌哆曩嚩日哩二合十三冒去引地曼上監上迦囉上楞上訖哩二合帝十四薩嚩怛他去引𦾨跢上引地瑟恥二合帝十五冒去引他野冒去引他野十六冒去引地冒準上地十七沒𠆙切身十八參去冒引去他野參去冒去引他野十九左攞左攞左懶去覩二十薩嚩薩怛嚩二合引喃二十一薩嚩引嚩囉拏儞二十二薩嚩播跛尾𦾨帝二十三護嚕護嚕二十四薩嚩戍引上迦尾𦾨帝二十五薩嚩怛他去引𦾨跢紇哩二合那野嚩日哩二合抳二十六參去婆去囉參去婆去囉二十七薩嚩多塢瑟膩二合灑二十八陀去引羅抳母捺哩二合二十九沒第蘇沒第三十薩轉舌嚩怛他去引𦾨哆上引地瑟恥二合哆三十一馱上引覩𦾨轉舌陛娑嚩二合引賀引三十二參去麼野引地瑟恥二合帝娑嚩二合引賀引三十三薩嚩怛他去引𦾨跢上引三十四紇哩二合那馱上引覩母捺哩二合娑嚩二合引賀引三十五阿鉢囉二合底瑟恥二合多窣覩二合閉三十六怛他去引𦾨哆上引地瑟恥二合帝三十七虎嚕虎嚕吽引吽引娑嚩二合引賀引三十八唵引三十九薩嚩怛他去引𦾨哆四十塢瑟膩二合灑陀去囉抳母捺哩二合四十一薩嚩怛他去引𦾨哆四十二馱上引覩尾部尸跢上引四十三地瑟恥二合帝吽吽吽娑嚩二合引賀引四十四爾時世尊説此呪已告金剛手言今此全身祕密篋印心陀羅尼是諸如來普皆宣説遍十方界於一一方有九十九胡麻量等形像如來百千俱胝那瑜多諸佛如來聞説此法皆來至此同共讚言善哉善哉釋迦牟尼善能演説正法篋印心陀羅尼廣令流布行閻浮提復令一切諸有情等以全身舍利安置此塔由此十方一切如來以諸三昧而加護之若復有人受持讀誦解説書寫此全身舍利祕密篋印心陀羅尼經及以金銀栴檀雕彩莊嚴安置塔中彼十方世界一切如來恆來在此而加護之爾時世尊説此正法篋印心陀羅尼時此舊破壞丘埠之中出現七寶微妙之塔相輪幢幡種種莊嚴人天大衆無不皆見久現如故彼時衆會諸大菩薩及聲聞衆天龍八部人非人等覩此希奇皆悉歡喜爾時世尊説此法時諸大衆等金剛手大藥叉主無垢妙光大婆羅門并諸菩薩諸大聲聞天龍藥叉犍闥婆阿素囉𦾨嚕荼緊那囉麼護囉誐人非人等國王大臣長者居士一切大衆聞佛所説一心信受歡喜而退
